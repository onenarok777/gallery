

networks:
  gallery_internal:
    driver: bridge

services:
  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
    ports:
      - "5001:3000"
    depends_on:
      - api
    networks:
      - gallery_internal
    env_file:
      - .env
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5002
      - INTERNAL_API_URL=http://api:4000
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
    ports:
      - "5002:4000"
    depends_on:
      face-service:
        condition: service_started
      postgres:
        condition: service_healthy
    networks:
      - gallery_internal
    env_file:
      - .env
    environment:
      - FACE_SERVICE_URL=http://face-service:5001
      - DATABASE_URL=postgres://gallery_admin:gallery_password@postgres:5432/gallery_db
    restart: unless-stopped

  face-service:
    build:
      context: ./apps/face-service
      dockerfile: Dockerfile
    ports:
      - "5003:5001"
    depends_on:
      - qdrant
    networks:
      - gallery_internal
    volumes:
      - publicmodels_data:/app/models
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "5004:6333"
    networks:
      - gallery_internal
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    ports:
      - "127.0.0.1:5005:5432"
    networks:
      - gallery_internal
    environment:
      - POSTGRES_USER=gallery_admin
      - POSTGRES_PASSWORD=gallery_password
      - POSTGRES_DB=gallery_db
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gallery_admin -d gallery_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  qdrant_data:
  publicmodels_data:
  db_data:
