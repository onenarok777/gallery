version: '3.8'

networks:
  gallery_internal:
    driver: bridge

services:
  web:
    build: 
      context: ./apps/web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - gallery_internal
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4000
      - INTERNAL_API_URL=http://api:4000
    restart: unless-stopped

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    depends_on:
      - face-service
    networks:
      - gallery_internal
    environment:
      - FACE_SERVICE_URL=http://face-service:8000
    restart: unless-stopped

  face-service:
    build:
      context: ./apps/face-service
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      - qdrant
    networks:
      - gallery_internal
    volumes:
      - publicmodels_data:/app/models
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    networks:
      - gallery_internal
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

volumes:
  qdrant_data:
  publicmodels_data:
